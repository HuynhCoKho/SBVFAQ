<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>HỎI ĐÁP QUY ĐỊNH VỀ QUẢN LÝ NGOẠI HỐI</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <canvas id="fxCanvas" aria-hidden="true"></canvas>
    <main class="app-shell">
      <aside class="topic-panel" aria-label="TRA CỨU NHANH QUY ĐỊNH THEO CHỦ ĐỀ">
        <div class="topic-scroll">
          <h2>TRA CỨU NHANH QUY ĐỊNH THEO CHỦ ĐỀ</h2>
          <nav id="topicList" class="topic-list"></nav>

          <h2 class="topic-subtitle">TOOL</h2>
          <nav id="toolList" class="topic-list"></nav>
        </div>
        <p class="author">Author: Huynh Co Kho</p>
      </aside>

      <section class="chat-panel" aria-label="HỎI ĐÁP QUY ĐỊNH VỀ QUẢN LÝ NGOẠI HỐI">
        <header class="chat-header">
          <div>
            <p class="eyebrow">GitHub Pages chatbot</p>
            <h1>HỎI ĐÁP QUY ĐỊNH VỀ QUẢN LÝ NGOẠI HỐI</h1>
          </div>
          <span id="connectionStatus" class="status-badge">Chưa cấu hình</span>
        </header>

        <div id="messages" class="messages" aria-live="polite">
          <article class="message bot">
            <div class="avatar">AI</div>
            <div class="bubble">
              <p>Bạn nhập câu hỏi về quy định. Hệ thống sẽ gửi câu hỏi sang Apps Script, đọc dữ liệu Google Sheet và dùng AI để trả lời.</p>
            </div>
          </article>
        </div>

        <form id="questionForm" class="composer">
          <label class="sr-only" for="questionInput">Nhập câu hỏi</label>
          <textarea
            id="questionInput"
            name="question"
            rows="3"
            placeholder="Ví dụ: Cá nhân cư trú được cho vay ra nước ngoài không?"
            required
          ></textarea>
          <button id="sendButton" type="submit">Gửi câu hỏi</button>
        </form>
      </section>
    </main>
<body>
